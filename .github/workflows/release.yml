name: Release

# 사용법:
#   1) electron/package.json 의 "version" 을 올린다 (예: 0.1.2 -> 0.1.3)
#   2) git tag v0.1.3 && git push origin v0.1.3
#   3) 이 워크플로가 mac(universal) + Windows(x64) 를 빌드해 GitHub Release 로 자동 공개한다
#      -> 공개되는 순간부터 설치된 앱들이 update.electronjs.org 를 통해 자동 업데이트된다
#      (검토 후 수동 공개로 바꾸려면 forge.config.js publisher 의 draft 를 true 로)
#
# 참고: macOS 자동 업데이트는 Apple Developer ID 코드서명 + 노터라이즈가 있어야만 동작한다.
#       서명을 붙이려면 APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID 시크릿을 추가하고
#       forge.config.js packagerConfig 에 osxSign/osxNotarize 를 설정한다.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        shell: bash
        run: |
          (cd frontend && npm ci)
          (cd backend && npm ci)
          (cd electron && npm ci)
      - name: Build frontend + stage resources
        working-directory: electron
        run: npm run build:resources
      # universal 빌드는 네이티브 모듈(get-windows) 때문에 arm64/x64 mach-o 개수가
      # 안 맞아 stitching이 실패한다. Apple Silicon 대상 arm64로 빌드한다.
      # (Intel Mac도 지원하려면 아래에 --arch=x64 publish 스텝을 추가하면 된다.)
      - name: Publish macOS (arm64) to GitHub Release (auto-publish)
        working-directory: electron
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-forge publish --arch=arm64

  release-windows:
    # windows-latest가 VS2026(내부 버전 "18") 이미지로 바뀌면서 node-gyp가 그
    # 버전을 인식하지 못해 네이티브 모듈(get-windows) 리빌드가 깨졌다. VS2022가
    # 든 windows-2022로 고정한다 — v0.1.21 Windows 빌드가 성공했던 환경.
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        shell: bash
        run: |
          (cd frontend && npm ci)
          (cd backend && npm ci)
          (cd electron && npm ci)
      - name: Build frontend + stage resources
        working-directory: electron
        run: npm run build:resources
      - name: Publish Windows (x64) to GitHub Release (auto-publish)
        working-directory: electron
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-forge publish --arch=x64
